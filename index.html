<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Levente Lokos — a coffee-shaped portfolio</title>
    <meta name="description" content="An interactive 3D coffee bar. Grind, tamp, pull, steam and pour your way through my portfolio." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0805; overflow: hidden; }
      canvas { display: block; width: 100vw; height: 100vh; }
      #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
      #vignette {
        position: fixed; inset: 0; pointer-events: none; z-index: 1;
        background: radial-gradient(ellipse at center, rgba(0,0,0,0) 58%, rgba(10,8,5,0.42) 100%);
      }
    </style>
  </head>
  <body>
    <div id="vignette"></div>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
